{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h1>Latest Posts</h1>

    <a href="{% url 'post_create' %}" class="btn btn-primary rounded-pill">
        + New Post
    </a>

</div>

{% for post in posts %}

<div class="card mb-4">

    <div class="card-body">

        <h3>
            <a href="{% url 'post_detail' post.pk %}">
                {{ post.title }}
            </a>
        </h3>

        <p class="text-secondary">
            {{ post.content|truncatewords:30 }}
        </p>

        <hr>

        <div class="d-flex justify-content-between">

            <small>
                👤 {{ post.author }}
            </small>

            <small>
                📅 {{ post.created_at }}
            </small>

        </div>

    </div>

</div>

{% empty %}

<div class="alert alert-info">
    No posts yet.
</div>

{% endfor %}

{% endblock %}
