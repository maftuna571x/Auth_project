{% extends "base.html" %}

{% block content %}

<div class="card shadow">

<div class="card-body text-center">

<h2 class="text-danger">

Delete Post

</h2>

<hr>

<p>

Are you sure you want to delete

<strong>

{{ post.title }}

</strong>?

</p>

<form method="post">

{% csrf_token %}

<button class="btn btn-danger">

Yes, Delete

</button>

<a href="{% url 'post_detail' post.pk %}"

class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

{% endblock %}
