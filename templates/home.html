{% extends 'base.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">

    <div class="card shadow p-5 text-center" style="width: 100%; max-width: 500px; border-radius: 15px;">

        <h1 class="mb-3">🚀 Django Auth Project</h1>

        {% if user.is_authenticated %}

            <h4 class="mb-3">Welcome back, <span class="text-success">{{ user.username }}</span> 🎉</h4>

            <p class="text-muted">You are successfully logged in.</p>

            <a href="{% url 'dashboard' %}" class="btn btn-primary w-100 mb-2">
                Go to Dashboard
            </a>

            <a href="{% url 'logout' %}" class="btn btn-danger w-100">
                Logout
            </a>

        {% else %}

            <p class="text-muted">Please login or create an account</p>

            <a href="{% url 'login' %}" class="btn btn-primary w-100 mb-2">
                Login
            </a>

            <a href="{% url 'signup' %}" class="btn btn-success w-100">
                Sign Up
            </a>

        {% endif %}

    </div>

</div>

{% endblock %}
