<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>CodeLife Blog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
        }

        .navbar{
            background:linear-gradient(90deg,#0f172a,#1e293b);
        }

        .navbar-brand{
            font-weight:bold;
            font-size:24px;
        }

        .nav-btn{
            border-radius:30px;
            padding:8px 18px;
            margin-left:8px;
        }

        .card{
            border:none;
            border-radius:18px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-4px);
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">
🚀 CodeLife
</a>

<div>

<a class="btn btn-outline-light nav-btn"
href="/blog/">
Blog
</a>

{% if user.is_authenticated %}

<a class="btn btn-success nav-btn"
href="/accounts/">
Dashboard
</a>

<a class="btn btn-danger nav-btn"
href="/accounts/logout/">
Logout
</a>

{% else %}

<a class="btn btn-primary nav-btn"
href="/accounts/login/">
Login
</a>

{% endif %}

</div>

</div>

</nav>

<div class="container mt-5">

{% block content %}

{% endblock %}

</div>

</body>
</html>
